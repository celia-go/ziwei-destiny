<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗数命盘 - 星命预测系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars-background"></div>

    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="title-icon">✦</span>
                紫微斗数命盘
                <span class="title-icon">✦</span>
            </h1>
            <p class="subtitle">天机星动 · 命运可期</p>
        </header>

        <!-- 输入面板 -->
        <section class="input-panel" id="inputPanel">
            <div class="form-container">
                <h2 class="section-title">请输入生辰信息</h2>

                <div class="calendar-notice">
                    <span class="notice-icon">⚠️</span>
                    <p>紫微斗数传统使用<strong>农历</strong>（阴历）排盘。如果您只知道阳历生日，请选择"阳历"，系统会自动转换。</p>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>性别</label>
                        <select id="gender" class="input-field">
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>历法选择</label>
                        <select id="calendarType" class="input-field" onchange="updateCalendarLabels()">
                            <option value="lunar">农历（阴历）</option>
                            <option value="solar">阳历（公历）</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>出生年份 <span id="yearLabel" class="label-hint">（农历）</span></label>
                        <input type="number" id="year" class="input-field" placeholder="1990" min="1900" max="2100">
                    </div>

                    <div class="form-group">
                        <label>出生月份 <span id="monthLabel" class="label-hint">（农历）</span></label>
                        <select id="month" class="input-field">
                            <option value="">请选择</option>
                            <option value="1">一月</option>
                            <option value="2">二月</option>
                            <option value="3">三月</option>
                            <option value="4">四月</option>
                            <option value="5">五月</option>
                            <option value="6">六月</option>
                            <option value="7">七月</option>
                            <option value="8">八月</option>
                            <option value="9">九月</option>
                            <option value="10">十月</option>
                            <option value="11">十一月</option>
                            <option value="12">十二月</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>出生日期 <span id="dayLabel" class="label-hint">（农历）</span></label>
                        <input type="number" id="day" class="input-field" placeholder="15" min="1" max="31">
                    </div>

                    <div class="form-group">
                        <label>出生时辰</label>
                        <select id="hour" class="input-field">
                            <option value="">请选择</option>
                            <option value="0">子时 (23:00-01:00)</option>
                            <option value="1">丑时 (01:00-03:00)</option>
                            <option value="2">寅时 (03:00-05:00)</option>
                            <option value="3">卯时 (05:00-07:00)</option>
                            <option value="4">辰时 (07:00-09:00)</option>
                            <option value="5">巳时 (09:00-11:00)</option>
                            <option value="6">午时 (11:00-13:00)</option>
                            <option value="7">未时 (13:00-15:00)</option>
                            <option value="8">申时 (15:00-17:00)</option>
                            <option value="9">酉时 (17:00-19:00)</option>
                            <option value="10">戌时 (19:00-21:00)</option>
                            <option value="11">亥时 (21:00-23:00)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-primary" onclick="generateChart()">
                    <span class="btn-icon">✨</span>
                    生成命盘
                </button>
            </div>
        </section>

        <!-- 命盘显示 -->
        <section class="chart-panel hidden" id="chartPanel">
            <div class="chart-header">
                <h2 class="section-title">紫微命盘</h2>
                <p class="birth-info" id="birthInfo"></p>
            </div>

            <!-- 十二宫格 -->
            <div class="zodiac-chart" id="zodiacChart">
                <!-- 将通过JavaScript动态生成 -->
            </div>

            <!-- 命盘解析 -->
            <div class="interpretation-panel">
                <div class="interpretation-card">
                    <h3 class="card-title">
                        <span class="card-icon">🌟</span>
                        本命分析
                    </h3>
                    <div id="lifeAnalysis" class="analysis-content"></div>
                </div>

                <div class="interpretation-card">
                    <h3 class="card-title">
                        <span class="card-icon">📅</span>
                        流年运势
                    </h3>
                    <div class="year-selector">
                        <label>选择年份：</label>
                        <input type="number" id="yearSelect" class="input-field-small" min="1900" max="2100">
                        <button class="btn-secondary" onclick="analyzeYear()">查看运势</button>
                    </div>
                    <div id="yearAnalysis" class="analysis-content"></div>
                </div>

                <div class="interpretation-card">
                    <h3 class="card-title">
                        <span class="card-icon">📆</span>
                        流日预测
                    </h3>
                    <div class="day-selector">
                        <label>选择日期：</label>
                        <input type="date" id="daySelect" class="input-field-small">
                        <button class="btn-secondary" onclick="analyzeDay()">查看当日</button>
                    </div>
                    <div id="dayAnalysis" class="analysis-content"></div>
                </div>
            </div>

            <!-- 风水建议 -->
            <div class="fengshui-section">
                <h2 class="section-title" style="margin-top: 3rem;">
                    <span style="color: var(--gold);">🏠</span>
                    风水布局建议
                </h2>

                <div class="interpretation-panel">
                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">🏙️</span>
                            城市选择
                        </h3>
                        <div id="cityAnalysis" class="analysis-content"></div>
                    </div>

                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">🧭</span>
                            方位吉凶
                        </h3>
                        <div id="directionAnalysis" class="analysis-content"></div>
                    </div>

                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">🏡</span>
                            家居布局
                        </h3>
                        <div id="homeAnalysis" class="analysis-content"></div>
                    </div>

                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">💼</span>
                            办公风水
                        </h3>
                        <div id="officeAnalysis" class="analysis-content"></div>
                    </div>

                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">🎨</span>
                            色彩装饰
                        </h3>
                        <div id="colorAnalysis" class="analysis-content"></div>
                    </div>

                    <div class="interpretation-card">
                        <h3 class="card-title">
                            <span class="card-icon">✈️</span>
                            出行方位
                        </h3>
                        <div id="travelAnalysis" class="analysis-content"></div>
                    </div>
                </div>
            </div>

            <button class="btn-back" onclick="reset()">
                ← 重新输入
            </button>
        </section>
    </div>

    <footer class="footer">
        <p>紫微斗数命理预测系统 · 基于传统算法 · 仅供参考娱乐</p>
    </footer>

    <!-- 星曜详细信息弹窗 -->
    <div id="starModal" class="star-modal hidden">
        <div class="star-modal-content">
            <span class="star-modal-close" onclick="closeStarModal()">&times;</span>
            <div id="starModalBody"></div>
        </div>
    </div>

    <script src="lunar.js?v=3.2"></script>
    <script src="ziwei-accurate.js?v=3.2"></script>
    <script src="star-info.js?v=3.2"></script>
    <script src="fengshui.js?v=3.2"></script>
    <script src="app.js?v=3.2"></script>
</body>
</html>
